# Pack Lexora AI desktop UI (Flet + PyInstaller) for Windows and macOS.
# - Push tag v* → GitHub Release uploads LexoraAI.exe (Windows) and LexoraAI-macos-arm64.dmg (macOS).
# - workflow_dispatch → build only; download those binaries from the workflow run artifacts.

name: Desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-windows:
    name: Pack (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install "pyinstaller>=6.3,<7"

      - name: Flet pack
        run: >
          flet pack -y -v src/lexora/ui/main.py
          -i lexora-ai-icon.ico
          -n LexoraAI
          --product-name "Lexora AI"
          --add-data "assets;assets"
          --add-data "lexora-ai-icon.ico;."

      - name: Verify Windows executable
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/LexoraAI.exe")) { Get-ChildItem dist; throw "Expected dist/LexoraAI.exe" }

      - uses: actions/upload-artifact@v4
        with:
          name: lexora-desktop-windows-amd64
          path: dist/LexoraAI.exe

  package-macos:
    name: Pack (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install "pyinstaller>=6.3,<7"
          # PyInstaller on macOS requires .icns unless Pillow can convert from .ico
          pip install "pillow>=10,<12"

      - name: Flet pack
        run: >
          flet pack -y -v src/lexora/ui/main.py
          -i lexora-ai-icon.ico
          -n LexoraAI
          --product-name "Lexora AI"
          --add-data "assets:assets"
          --add-data "lexora-ai-icon.ico:."

      - name: Create macOS disk image (.dmg)
        run: |
          set -eux
          ls -la dist
          test -d "dist/LexoraAI.app"
          # Single-file installer users expect on macOS (UDZO = compressed read-only DMG)
          hdiutil create -volname "Lexora AI" -srcfolder "dist/LexoraAI.app" -ov -format UDZO "LexoraAI-macos-arm64.dmg"
          ls -la LexoraAI-macos-arm64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: lexora-desktop-macos-arm64
          path: LexoraAI-macos-arm64.dmg

  release:
    name: Publish GitHub Release
    needs: [package-windows, package-macos]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: lexora-desktop-*
          merge-multiple: true

      - name: List release files
        run: find release-assets -type f -maxdepth 3 -print

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/LexoraAI.exe
            release-assets/LexoraAI-macos-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
