name: Desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  package-windows:
    name: Pack (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build EXE (Flet)
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          pip install flet pillow

          # Build to dist/ (adjust the entry script if yours differs)
          # If you already build dist in a previous step/job, you can remove this.
          flet pack main.py --name LexoraAI --distpath dist --yes

          if (-not (Test-Path .\dist\LexoraAI.exe)) {
            Write-Error "dist\\LexoraAI.exe not found after build. Check entry script path.";
            Get-ChildItem -Recurse dist | Select-Object FullName;
            exit 1
          }

      - name: Create ZIP artifact
        shell: pwsh
        run: |
          if (Test-Path LexoraAI-windows-amd64.zip) { Remove-Item LexoraAI-windows-amd64.zip -Force }
          Compress-Archive -Path dist\* -DestinationPath LexoraAI-windows-amd64.zip

      - name: Install WiX Toolset (v3)
        shell: pwsh
        run: |
          # WiX v3 provides candle.exe/light.exe
          choco install wixtoolset --version=3.14.1 -y

      - name: Build MSI (WiX)
        shell: pwsh
        run: |
          # IMPORTANT: write intermediates to RUNNER_TEMP to avoid workspace ACL/locking issues
          $wixOut = Join-Path $env:RUNNER_TEMP "wixout"
          Remove-Item $wixOut -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $wixOut | Out-Null

          $candle = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory -Filter "WiX Toolset*" -ErrorAction SilentlyContinue |
            ForEach-Object { Join-Path $_.FullName "bin\candle.exe" } |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1
          if (-not $candle) { throw "candle.exe not found; WiX install failed?" }

          $wixBin = Split-Path $candle -Parent
          $dist = (Resolve-Path "dist").Path

          & (Join-Path $wixBin "candle.exe") -arch x64 `
            "-dSourceDir=$dist" `
            "-dProductVersion=${{ github.ref_name }}" `
            -out $wixOut `
            "packaging\windows\Product.wxs"

          & (Join-Path $wixBin "light.exe") -ext WixUIExtension -out "LexoraAI-windows-amd64.msi" (Join-Path $wixOut "Product.wixobj")

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: lexora-desktop-windows
          path: |
            LexoraAI-windows-amd64.zip
            LexoraAI-windows-amd64.msi

  package-macos:
    name: Pack (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS app (Flet)
        shell: bash
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install flet pillow

          # Prefer flet build for macOS distribution; adjust if you still use flet pack.
          flet build macos --bundle-id com.appvity.lexoraai --yes

          # Zip the output (you may adjust the path depending on your Flet version/output)
          mkdir -p dist-macos
          # Common output directory for flet build is "build"; we zip the whole build output.
          zip -r "LexoraAI-macos-arm64.zip" build || true

      - name: Upload artifacts (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: lexora-desktop-macos
          path: |
            LexoraAI-macos-arm64.zip

  release:
    name: Publish GitHub Release
    needs: [package-windows, package-macos]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: lexora-desktop-*
          merge-multiple: true

      - name: Create/Update GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes ""
          gh release upload "$tag" release-assets/* --clobber
