name: Desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"
  APP_NAME: "LexoraAI"
  APP_ENTRY: "src/lexora/ui/main.py"

jobs:
  package-windows:
    name: Pack (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build onedir app (pyinstaller spec -> dist\LexoraAI\LexoraAI.exe)
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\Activate.ps1

          python -m pip install --upgrade pip

          # Install app dependencies so PyInstaller analyzes the same
          # environment the desktop app actually needs at runtime.
          # NOTE: install the package NON-editable. An editable install
          # (``pip install -e .``) leaves the ``lexora`` package as a
          # .pth-based namespace that PyInstaller can miss submodules from,
          # which is a frequent cause of frozen apps silently failing to
          # import our providers/translator modules.
          pip install -r requirements.txt
          pip install .
          pip install "pyinstaller>=6.3,<7" "pillow>=10,<12"

          # Build onedir output under dist\LexoraAI\ using our explicit spec
          # so Flet's native binaries and all lexora/provider data files are
          # bundled. Onedir avoids the silent "missing DLL / side-by-side"
          # failures that onefile produces on Windows end-user machines.
          if (Test-Path .\dist) { Remove-Item .\dist -Recurse -Force }
          if (Test-Path .\build) { Remove-Item .\build -Recurse -Force }
          pyinstaller --noconfirm --clean --distpath dist --workpath build `
            packaging\windows\lexora_ai.spec

          $exePath = ".\dist\${{ env.APP_NAME }}\${{ env.APP_NAME }}.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "$exePath not found. Check the PyInstaller spec output."
            Get-ChildItem -Recurse dist, build | Select-Object FullName
            exit 1
          }
          Write-Host "Built: $exePath"

      - name: Create ZIP artifact (Windows)
        shell: pwsh
        run: |
          $zipName = "${{ env.APP_NAME }}-windows-amd64.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          # Zip the whole onedir folder so users who don't want the MSI can
          # just extract and run LexoraAI\LexoraAI.exe.
          Compress-Archive -Path "dist\${{ env.APP_NAME }}" -DestinationPath $zipName

      - name: Locate WiX Toolset (candle/light/heat)
        shell: pwsh
        run: |
          $candle = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory -Filter "WiX Toolset*" -ErrorAction SilentlyContinue |
            ForEach-Object { Join-Path $_.FullName "bin\candle.exe" } |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1

          if (-not $candle) {
            Write-Host "WiX not found, installing wixtoolset..."
            choco install wixtoolset --version=3.14.1 -y --no-progress
            $candle = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory -Filter "WiX Toolset*" -ErrorAction SilentlyContinue |
              ForEach-Object { Join-Path $_.FullName "bin\candle.exe" } |
              Where-Object { Test-Path $_ } |
              Select-Object -First 1
          } else {
            Write-Host "WiX already available, skipping installation."
          }

          if (-not $candle) {
            throw "WiX candle.exe not found on runner. Install WiX or add choco install wixtoolset."
          }

          $wixBin = Split-Path $candle -Parent
          "WIX_BIN=$wixBin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "WiX found at: $wixBin"

      - name: Build MSI (WiX)
        shell: pwsh
        run: |
          # Use RUNNER_TEMP for intermediates to avoid workspace permission/locking issues
          $wixOut = Join-Path $env:RUNNER_TEMP "wixout"
          Remove-Item $wixOut -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $wixOut | Out-Null

          # Path to the PyInstaller onedir output folder. Heat will harvest
          # all files under this directory (LexoraAI.exe + _internal\*).
          $harvestDir = (Resolve-Path "dist\${{ env.APP_NAME }}").Path

          # MSI version must be numeric n.n.n.n - derive from tag vX.Y.Z.
          # workflow_dispatch has no tag so fall back to 0.0.0.0 for manual runs.
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          if ($ver -match '^\d+\.\d+\.\d+$') { $ver = "$ver.0" }
          if ($ver -notmatch '^\d+\.\d+\.\d+\.\d+$') { $ver = "0.0.0.0" }
          Write-Host "MSI ProductVersion: $ver"

          # --- 1) Harvest the onedir folder ---------------------------------
          # -srd: suppress root dir (contents go directly into APPLICATIONFOLDER)
          # -sreg: don't harvest registry (we author it ourselves)
          # -scom: don't harvest COM registration
          # -sfrag: single fragment
          # -gg: auto-generate GUIDs
          # -ke: keep empty directories
          # -cg LexoraComponents: ComponentGroup id referenced by Product.wxs
          # -dr APPLICATIONFOLDER: anchor at our APPLICATIONFOLDER directory
          # -var var.HarvestSource: file SourceFile paths use $(var.HarvestSource)
          $harvestedWxs = Join-Path $wixOut "LexoraComponents.wxs"
          & (Join-Path $env:WIX_BIN "heat.exe") dir $harvestDir `
            -cg LexoraComponents `
            -dr APPLICATIONFOLDER `
            -srd -sreg -scom -sfrag -gg -ke `
            -var "var.HarvestSource" `
            -out $harvestedWxs

          if (-not (Test-Path $harvestedWxs)) {
            Write-Error "heat.exe did not produce $harvestedWxs"
            exit 1
          }

          # --- 2) Compile both WXS files ------------------------------------
          $productObj    = Join-Path $wixOut "Product.wixobj"
          $harvestedObj  = Join-Path $wixOut "LexoraComponents.wixobj"

          & (Join-Path $env:WIX_BIN "candle.exe") -arch x64 `
            "-dHarvestSource=$harvestDir" `
            "-dSourceDir=$harvestDir" `
            "-dProductVersion=$ver" `
            -out "$productObj" `
            "packaging\windows\Product.wxs"

          & (Join-Path $env:WIX_BIN "candle.exe") -arch x64 `
            "-dHarvestSource=$harvestDir" `
            -out "$harvestedObj" `
            "$harvestedWxs"

          # --- 3) Link into MSI ---------------------------------------------
          & (Join-Path $env:WIX_BIN "light.exe") -ext WixUIExtension `
            -out "${{ env.APP_NAME }}-windows-amd64.msi" `
            "$productObj" "$harvestedObj"

          if (-not (Test-Path "${{ env.APP_NAME }}-windows-amd64.msi")) {
            Write-Error "MSI was not produced."
            exit 1
          }

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: lexora-desktop-windows
          path: |
            ${{ env.APP_NAME }}-windows-amd64.zip
            ${{ env.APP_NAME }}-windows-amd64.msi

  package-macos:
    name: Pack (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build macOS app (flet pack)
        shell: bash
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install "pyinstaller>=6.3,<7" "pillow>=10,<12"

          flet pack -y -v "${APP_ENTRY}" \
            -i lexora-ai-icon.ico \
            -n "${APP_NAME}" \
            --product-name "Lexora AI" \
            --add-data "assets:assets" \
            --add-data "lexora-ai-icon.ico:."

          test -d "dist/${APP_NAME}.app"
          rm -f "${APP_NAME}-macos-arm64.zip"
          zip -ry "${APP_NAME}-macos-arm64.zip" "dist/${APP_NAME}.app"

      - name: Upload artifacts (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: lexora-desktop-macos
          path: |
            ${{ env.APP_NAME }}-macos-arm64.zip

  release:
    name: Publish GitHub Release
    needs: [package-windows, package-macos]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: lexora-desktop-*
          merge-multiple: true

      - name: Create/Update GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes ""
          gh release upload "$tag" release-assets/* --clobber
