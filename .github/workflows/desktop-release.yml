name: Desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"
  APP_NAME: "LexoraAI"
  APP_ENTRY: "main.py" # TODO: đổi thành đúng entry file của bạn, ví dụ: src/lexora_ai/main.py

jobs:
  package-windows:
    name: Pack (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build EXE (flet pack -> dist\LexoraAI.exe)
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\Activate.ps1

          python -m pip install --upgrade pip

          # flet pack relies on PyInstaller under the hood → must install pyinstaller
          pip install flet pyinstaller pillow

          # Build single EXE into dist/
          if (Test-Path .\dist) { Remove-Item .\dist -Recurse -Force }
          flet pack "${{ env.APP_ENTRY }}" --name "${{ env.APP_NAME }}" --distpath dist --yes

